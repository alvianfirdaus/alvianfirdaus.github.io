<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Inventaris Multimedia</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Load Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <style>
        :root {
            --primary: #2563eb; --primary-hover: #1d4ed8;
            --bg-color: #f1f5f9; --card-bg: #ffffff;
            --text-main: #1e293b; --text-muted: #64748b;
            --border: #e2e8f0; --danger: #ef4444; --warning: #f59e0b;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background-color: var(--bg-color); color: var(--text-main); }

        .view-section { display: none; min-height: 100vh; padding: 20px; align-items: center; justify-content: center; }
        .view-section.active { display: flex; flex-direction: column; }
        
        .card { background: var(--card-bg); width: 100%; max-width: 500px; padding: 30px; border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); }
        .card.dashboard-card { max-width: 1100px; padding: 20px; align-items: flex-start; justify-content: flex-start; }

        .header { text-align: center; margin-bottom: 25px; }
        .header h2 { font-size: 1.5rem; margin-bottom: 5px; }
        .header p { font-size: 0.9rem; color: var(--text-muted); }

        .form-group { margin-bottom: 18px; }
        label { display: block; font-size: 0.9rem; font-weight: 500; margin-bottom: 8px; }
        input, select { width: 100%; padding: 10px 15px; border: 1px solid var(--border); border-radius: 6px; font-size: 0.95rem; background-color: #f8fafc; }
        input:focus, select:focus { outline: none; border-color: var(--primary); background-color: #fff; }
        
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }

        button { width: 100%; padding: 12px; background-color: var(--primary); color: white; border: none; border-radius: 6px; font-size: 1rem; font-weight: 600; cursor: pointer; transition: 0.2s; }
        button:hover { background-color: var(--primary-hover); }
        button:disabled { background-color: #94a3b8; cursor: not-allowed; }
        
        .btn-outline { background: transparent; border: 1px solid var(--border); color: var(--text-main); }
        .btn-danger { background: var(--danger); }
        .btn-warning { background: var(--warning); }
        
        .btn-icon { width: auto; padding: 6px 10px; font-size: 0.8rem; margin-right: 5px; }

        .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; width: 100%; }
        .action-buttons { display: flex; gap: 10px; }
        .action-buttons button { width: auto; padding: 8px 15px; font-size: 0.9rem; margin: 0;}

        /* Dashboard Stats & Chart Area */
        .dashboard-grid { display: grid; grid-template-columns: 1fr 2fr; gap: 20px; width: 100%; margin-bottom: 20px; }
        .chart-container { background: #f8fafc; padding: 15px; border-radius: 8px; border: 1px solid var(--border); display: flex; justify-content: center; align-items: center; height: 250px;}
        .stats-container { display: grid; grid-template-columns: 1fr; gap: 15px; }
        .stat-box { background: #f8fafc; padding: 20px; border-radius: 8px; border: 1px solid var(--border); text-align: center; }
        .stat-box h3 { font-size: 2rem; color: var(--primary); }
        .stat-box p { font-size: 0.9rem; color: var(--text-muted); font-weight: 600;}

        .table-responsive { width: 100%; overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; text-align: left; font-size: 0.9rem; }
        th, td { padding: 12px 15px; border-bottom: 1px solid var(--border); }
        th { background-color: #f8fafc; font-weight: 600; color: var(--text-muted); white-space: nowrap; }
        tr:hover { background-color: #f8fafc; }
        .badge { padding: 4px 8px; border-radius: 4px; font-size: 0.8rem; font-weight: 500; }
        .badge-Baru { background: #dcfce7; color: #166534; } 
        .badge-Bekas { background: #fef3c7; color: #92400e; } 

        .alert { display: none; padding: 12px; border-radius: 6px; margin-bottom: 20px; font-size: 0.9rem; text-align: center; }
        .alert-error { background-color: #fee2e2; color: #991b1b; border: 1px solid #fecaca; }
        .alert-success { background-color: #dcfce7; color: #166534; border: 1px solid #bbf7d0; }
        .loading-text { text-align: center; padding: 20px; color: var(--text-muted); }

        @media (max-width: 768px) {
            .dashboard-grid { grid-template-columns: 1fr; }
            .top-bar { flex-direction: column; gap: 15px; align-items: flex-start;}
        }
    </style>
</head>
<body>

    <!-- ================= VIEW: LOGIN ================= -->
    <div id="loginView" class="view-section active">
        <div class="card">
            <div class="header">
                <h2>Login Inventaris</h2>
                <p>Masukkan kredensial untuk mengakses sistem</p>
            </div>
            <div id="loginAlert" class="alert alert-error"></div>
            <form id="loginForm">
                <div class="form-group"><label>Username</label><input type="text" id="username" required></div>
                <div class="form-group"><label>Password</label><input type="password" id="password" required></div>
                <button type="submit">Masuk</button>
            </form>
        </div>
    </div>

    <!-- ================= VIEW: DASHBOARD ================= -->
    <div id="dashboardView" class="view-section">
        <div class="card dashboard-card">
            <div class="top-bar">
                <h2>Dashboard Inventaris</h2>
                <div class="action-buttons">
                    <button onclick="openForm('create')"><i class="fas fa-plus"></i> Tambah Data</button>
                    <button onclick="refreshData()" class="btn-outline"><i class="fas fa-sync"></i> Refresh</button>
                    <button onclick="logout()" class="btn-danger"><i class="fas fa-sign-out-alt"></i> Keluar</button>
                </div>
            </div>

            <!-- Area Grafik dan Statistik -->
            <div class="dashboard-grid">
                <div class="stats-container">
                    <div class="stat-box">
                        <h3 id="statTotal">0</h3>
                        <p>Total Barang</p>
                    </div>
                    <div class="grid-2">
                        <div class="stat-box">
                            <h3 id="statBaru" style="color: #166534;">0</h3>
                            <p>Baru</p>
                        </div>
                        <div class="stat-box">
                            <h3 id="statBekas" style="color: #92400e;">0</h3>
                            <p>Bekas</p>
                        </div>
                    </div>
                </div>
                <div class="chart-container">
                    <canvas id="categoryChart"></canvas>
                </div>
            </div>
            
            <!-- Area Tabel -->
            <div class="table-responsive">
                <table>
                    <thead>
                        <tr>
                            <th>Aksi</th>
                            <th>Kode</th>
                            <th>Nama Barang</th>
                            <th>Kategori</th>
                            <th>Jml</th>
                            <th>Kondisi</th>
                            <th>Keterangan</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody">
                        <tr><td colspan="7" class="loading-text">Menarik data dari Spreadsheet... <i class="fas fa-spinner fa-spin"></i></td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- ================= VIEW: FORM INPUT/EDIT ================= -->
    <div id="formView" class="view-section">
        <div class="card">
            <div class="header">
                <h2 id="formTitle">Input Inventaris</h2>
                <p id="formSubtitle">Catat barang baru</p>
            </div>
            <div id="formAlert" class="alert"></div>
            <form id="inventoryForm">
                <!-- Hidden inputs untuk Mode Edit/Delete -->
                <input type="hidden" name="action" id="formAction" value="create">
                <input type="hidden" name="row" id="formRow" value="">

                <div class="form-group"><label>Kode Barang</label><input type="text" name="kode_barang" id="inputKode" required></div>
                <div class="form-group"><label>Nama Barang & Merk</label><input type="text" name="nama_barang" id="inputNama" required></div>
                <div class="form-group"><label>Kategori Alat</label>
                    <select name="kategori" id="inputKategori" required>
                        <option value="Kamera & Lensa">Kamera & Lensa</option>
                        <option value="Audio & Mic">Audio & Mic</option>
                        <option value="Lighting">Lighting</option>
                        <option value="Komputer & Monitor">Komputer & Monitor</option>
                        <option value="Kabel & Aksesoris">Kabel & Aksesoris</option>
                        <option value="Lainnya">Lainnya</option>
                    </select>
                </div>
                <div class="grid-2">
                    <div class="form-group"><label>Jumlah</label><input type="number" name="jumlah" id="inputJumlah" min="1" required></div>
                    <div class="form-group"><label>Kondisi</label>
                        <select name="kondisi" id="inputKondisi" required>
                            <option value="Baru">Baru</option>
                            <option value="Bekas">Bekas</option>
                        </select>
                    </div>
                </div>
                <div class="form-group"><label>Keterangan</label><input type="text" name="keterangan" id="inputKeterangan" required></div>
                
                <button type="submit" id="btnSubmit">Simpan Data</button>
                <button type="button" onclick="showView('dashboardView')" class="btn-outline" style="margin-top: 10px;">Batal</button>
            </form>
        </div>
    </div>

    <script>
        // GANTI DENGAN URL WEB APP DEPLOYMENT TERBARUMU
        const scriptURL = 'https://script.google.com/macros/s/AKfycbxuMX5M-xoREPTy631xyRP-TJEZcrOc7G--2bU7O1BjGy5x1fhUhbobT_MfVc5Eu84JlA/exec';
        
        const USERNAME_VALID = "admin";
        const PASSWORD_VALID = "admin123";
        let myChart = null; // Variabel penampung grafik

        function showView(viewId) {
            document.querySelectorAll('.view-section').forEach(view => view.classList.remove('active'));
            document.getElementById(viewId).classList.add('active');
            if(viewId === 'dashboardView') refreshData();
        }

        window.onload = function() {
            if (sessionStorage.getItem('isLoggedIn') === 'true') showView('dashboardView');
        };

        // --- LOGIN & LOGOUT ---
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            if (document.getElementById('username').value === USERNAME_VALID && document.getElementById('password').value === PASSWORD_VALID) {
                sessionStorage.setItem('isLoggedIn', 'true'); showView('dashboardView');
            } else {
                document.getElementById('loginAlert').textContent = "Username/Password salah!";
                document.getElementById('loginAlert').style.display = 'block';
            }
        });
        function logout() { sessionStorage.removeItem('isLoggedIn'); showView('loginView'); }

        // --- BUKA FORM (CREATE / EDIT) ---
        function openForm(mode, data = null) {
            const form = document.getElementById('inventoryForm');
            form.reset();
            document.getElementById('formAlert').style.display = 'none';

            if(mode === 'create') {
                document.getElementById('formTitle').innerText = "Tambah Barang";
                document.getElementById('formAction').value = "create";
                document.getElementById('formRow').value = "";
                document.getElementById('btnSubmit').innerText = "Simpan Data Baru";
            } else if(mode === 'edit') {
                document.getElementById('formTitle').innerText = "Edit Barang";
                document.getElementById('formAction').value = "update";
                document.getElementById('formRow').value = data.row;
                
                // Isi form dengan data lama
                document.getElementById('inputKode').value = data.kode;
                document.getElementById('inputNama').value = data.nama;
                document.getElementById('inputKategori').value = data.kategori;
                document.getElementById('inputJumlah').value = data.jumlah;
                document.getElementById('inputKondisi').value = data.kondisi;
                document.getElementById('inputKeterangan').value = data.keterangan;
                document.getElementById('btnSubmit').innerText = "Update Data";
            }
            showView('formView');
        }

        // --- HAPUS DATA ---
        function deleteData(row) {
            if(confirm("Yakin ingin menghapus data ini? Aksi ini tidak dapat dibatalkan.")) {
                const formData = new FormData();
                formData.append('action', 'delete');
                formData.append('row', row);

                // Menampilkan animasi loading
                document.getElementById('tableBody').innerHTML = '<tr><td colspan="7" class="loading-text">Menghapus data... <i class="fas fa-spinner fa-spin"></i></td></tr>';
                
                fetch(scriptURL, { method: 'POST', body: formData })
                    .then(res => {
                        if (!res.ok) throw new Error("Gagal mengambil respon dari server");
                        return res.json();
                    })
                    .then(() => {
                        // Jika sukses, muat ulang tabel
                        refreshData(); 
                    })
                    .catch(err => {
                        // Jika gagal, tampilkan pesan dan hentikan muter-muternya
                        console.error("Error Hapus:", err);
                        alert("❌ Gagal menghapus data! Pastikan kamu sudah melakukan Deployment Baru.");
                        refreshData(); // Panggil ulang tabel agar tidak stuck loading
                    });
            }
        }

        // --- READ & RENDER DASHBOARD ---
        function refreshData() {
            const tableBody = document.getElementById('tableBody');
            tableBody.innerHTML = '<tr><td colspan="7" class="loading-text">Memuat data terbaru... <i class="fas fa-spinner fa-spin"></i></td></tr>';
            
            fetch(scriptURL)
                .then(res => {
                    // Cek apakah balasan dari Google sukses (bukan error HTML)
                    if (!res.ok) throw new Error("Gagal mengambil respon dari server");
                    return res.json();
                })
                .then(data => {
                    tableBody.innerHTML = ''; 
                    let totalItems = 0, countBaru = 0, countBekas = 0;
                    let categoryCount = {};

                    if(data.length === 0) {
                        tableBody.innerHTML = '<tr><td colspan="7" style="text-align:center;">Belum ada data inventaris.</td></tr>';
                        renderChart({}); // Render chart kosong
                        return;
                    }

                    data.reverse().forEach(row => {
                        // Statistik Kalkulasi
                        let qty = parseInt(row.jumlah) || 0;
                        totalItems += qty;
                        if(row.kondisi === "Baru") countBaru += qty;
                        if(row.kondisi === "Bekas") countBekas += qty;

                        categoryCount[row.kategori] = (categoryCount[row.kategori] || 0) + qty;

                        // Render Tabel
                        let kondisiClass = row.kondisi === "Baru" ? "badge-Baru" : "badge-Bekas";
                        let tr = document.createElement('tr');
                        
                        // Buat JSON string untuk dikirim ke fungsi Edit
                        let rowDataJson = JSON.stringify(row).replace(/'/g, "&apos;").replace(/"/g, "&quot;");

                        tr.innerHTML = `
                            <td>
                                <button onclick='openForm("edit", ${rowDataJson})' class="btn-warning btn-icon" title="Edit"><i class="fas fa-edit"></i></button>
                                <button onclick="deleteData(${row.row})" class="btn-danger btn-icon" title="Hapus"><i class="fas fa-trash"></i></button>
                            </td>
                            <td><strong>${row.kode}</strong></td>
                            <td>${row.nama}</td>
                            <td>${row.kategori}</td>
                            <td>${row.jumlah}</td>
                            <td><span class="badge ${kondisiClass}">${row.kondisi}</span></td>
                            <td>${row.keterangan}</td>
                        `;
                        tableBody.appendChild(tr);
                    });

                    // Update Angka Statistik
                    document.getElementById('statTotal').innerText = totalItems;
                    document.getElementById('statBaru').innerText = countBaru;
                    document.getElementById('statBekas').innerText = countBekas;

                    // Render Grafik
                    renderChart(categoryCount);
                })
                .catch(err => {
                    // JIKA GAGAL, TAMPILKAN PESAN ERROR BUKAN LOADING TERUS
                    console.error("Error fetching:", err);
                    tableBody.innerHTML = `<tr><td colspan="7" style="text-align:center; color:red; padding:20px;"><b>❌ Gagal memuat data.</b><br>Pastikan URL Apps Script benar dan akses diatur ke "Siapa Saja".</td></tr>`;
                    
                    document.getElementById('statTotal').innerText = "0";
                    document.getElementById('statBaru').innerText = "0";
                    document.getElementById('statBekas').innerText = "0";
                    renderChart({});
                });
        }

        // --- RENDER GRAFIK CHART.JS ---
        function renderChart(catData) {
            const ctx = document.getElementById('categoryChart').getContext('2d');
            if(myChart) myChart.destroy(); // Hancurkan chart lama agar tidak numpuk

            myChart = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: Object.keys(catData),
                    datasets: [{
                        data: Object.values(catData),
                        backgroundColor: ['#3b82f6', '#10b981', '#f59e0b', '#ef4444', '#8b5cf6', '#64748b'],
                        borderWidth: 1
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { position: 'right', labels: { boxWidth: 12, font: { size: 11 } } },
                        title: { display: true, text: 'Distribusi Kategori Barang' }
                    }
                }
            });
        }

        // --- SUBMIT FORM (CREATE / UPDATE) ---
        document.getElementById('inventoryForm').addEventListener('submit', e => {
            e.preventDefault();
            const btnSubmit = document.getElementById('btnSubmit');
            const formAlert = document.getElementById('formAlert');
            
            btnSubmit.disabled = true; btnSubmit.innerHTML = 'Memproses... ⏳';

            fetch(scriptURL, { method: 'POST', body: new FormData(e.target) })
                .then(response => {
                    formAlert.className = 'alert alert-success';
                    formAlert.innerHTML = '✅ Berhasil!'; formAlert.style.display = 'block';
                    setTimeout(() => showView('dashboardView'), 1000);
                })
                .catch(() => {
                    formAlert.className = 'alert alert-error';
                    formAlert.innerHTML = '❌ Gagal memproses data.'; formAlert.style.display = 'block';
                })
                .finally(() => { btnSubmit.disabled = false; });
        });
    </script>
</body>
</html>
