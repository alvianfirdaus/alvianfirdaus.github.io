<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>View Image</title>

    <style>
        html, body {
            margin: 0;
            padding: 0;
            height: 100%;
            background: #000;
            overflow: hidden;
        }

        .viewer {
            width: 100%;
            height: 100vh; /* full tinggi layar */
            display: flex;
            justify-content: center;
            align-items: center;
            background: #000;
        }

        .viewer img {
            width: 100%;
            height: 100%;
            object-fit: contain; /* biar ga kepotong */
            user-select: none;
            -webkit-user-drag: none;
            cursor: pointer;
        }

        /* Khusus HP biar benar-benar full */
        @media (max-width: 768px) {
            .viewer {
                height: 100dvh; /* lebih akurat di mobile */
            }
        }
    </style>
</head>
<body>

<div class="viewer">
    <a href="https://www.vidio.com" target="_blank">
        <img src="1.png" alt="image">
    </a>
</div>

</body>
</html>
