<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Surat Untuk Azizah</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Great+Vibes&family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet">

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Montserrat', sans-serif;
            background: #0a0205;
            background: radial-gradient(circle at top, #2a0812 0%, #0a0205 100%);
            color: #fdfbf7;
            min-height: 100vh;
            overflow-x: hidden;
            background-attachment: fixed;
            position: relative;
        }

        /* =========================================
           1. ORNAMEN BURUNG (BACKGROUND)
           ========================================= */
        .bird-container {
            position: fixed; width: 100%; pointer-events: none; z-index: 1; opacity: 0.3;
        }
        .bird-1 { top: 15%; animation: flyAcross 20s linear infinite; left: -10%; }
        .bird-2 { top: 30%; animation: flyAcross 35s linear infinite 5s; transform: scale(0.7); left: -15%; opacity: 0.2; }
        .bird-3 { top: 10%; animation: flyAcross 28s linear infinite 12s; transform: scale(0.5); left: -10%; opacity: 0.4; }
        .bird-4 { top: 40%; animation: flyAcross 40s linear infinite 2s; transform: scale(0.8); left: -20%; opacity: 0.25; }
        
        @keyframes flyAcross {
            0% { transform: translateX(-10vw) translateY(0) scale(var(--scale, 1)); }
            50% { transform: translateX(50vw) translateY(-30px) scale(var(--scale, 1)); }
            100% { transform: translateX(110vw) translateY(10px) scale(var(--scale, 1)); }
        }

        /* =========================================
           2. ORNAMEN DAUN BERGOYANG (FOREGROUND LAYER 3D)
           ========================================= */
        .ornament-corner {
            position: fixed; width: 140px; height: auto; pointer-events: none;
            z-index: 50; filter: drop-shadow(0 15px 25px rgba(0,0,0,0.9)); opacity: 0.85;
        }
        /* Sudut Bawah */
        .ornament-bottom-left { bottom: -30px; left: -30px; transform-origin: bottom left; animation: swayLeft 6s ease-in-out infinite alternate; }
        .ornament-bottom-right { bottom: -30px; right: -30px; transform-origin: bottom right; animation: swayRight 7s ease-in-out infinite alternate; }
        /* Sudut Atas (Gantung) */
        .ornament-top-left { top: -30px; left: -30px; transform-origin: top left; transform: rotate(180deg); animation: swayTopLeft 8s ease-in-out infinite alternate; }
        .ornament-top-right { top: -30px; right: -30px; transform-origin: top right; transform: rotate(180deg); animation: swayTopRight 9s ease-in-out infinite alternate; }

        @keyframes swayLeft { 0% { transform: rotate(-5deg) scale(1); } 100% { transform: rotate(10deg) scale(1.05); } }
        @keyframes swayRight { 0% { transform: rotate(5deg) scale(1); } 100% { transform: rotate(-10deg) scale(1.05); } }
        @keyframes swayTopLeft { 0% { transform: rotate(175deg) scale(1); } 100% { transform: rotate(190deg) scale(1.05); } }
        @keyframes swayTopRight { 0% { transform: rotate(-175deg) scale(1); } 100% { transform: rotate(-190deg) scale(1.05); } }

        /* =========================================
           3. DAUN & KELOPAK BERJATUHAN DINAMIS
           ========================================= */
        .petal {
            position: fixed; background: linear-gradient(135deg, #d4af37, #a88316);
            border-radius: 15% 85% 15% 85%; pointer-events: none; z-index: 51; /* Z-index tinggi agar lewat depan layar */
            box-shadow: 0 0 12px rgba(212, 175, 55, 0.6); animation: fallAnimation linear forwards;
        }
        .petal-bg {
            z-index: 2; /* Jatuh di belakang konten (efek parallax) */
            filter: blur(2px); opacity: 0.4 !important;
        }

        @keyframes fallAnimation {
            0% { transform: translateY(-10vh) rotate(0deg) scale(0.5); opacity: 0; }
            10% { opacity: 0.8; }
            90% { opacity: 0.6; }
            100% { transform: translateY(110vh) rotate(720deg) scale(1.2); opacity: 0; }
        }

        /* =========================================
           4. KUNANG-KUNANG (FIREFLIES)
           ========================================= */
        .firefly {
            position: fixed; width: 4px; height: 4px; background: #fdfbf7; border-radius: 50%;
            box-shadow: 0 0 15px 3px #d4af37; pointer-events: none; z-index: 3;
            animation: floatFirefly linear infinite alternate;
        }
        @keyframes floatFirefly {
            0% { transform: translate(0, 0) scale(0.8); opacity: 0.3; }
            50% { opacity: 1; }
            100% { transform: translate(40px, -60px) scale(1.2); opacity: 0.2; }
        }

        /* =========================================
           ANIMASI AMPLOP AWAL
           ========================================= */
        #layar-amplop {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center;
            background: rgba(10, 2, 5, 0.95); z-index: 100; transition: opacity 1.5s ease, visibility 1.5s ease; backdrop-filter: blur(8px);
        }
        .teks-petunjuk { font-family: 'Cinzel', serif; color: #d4af37; letter-spacing: 3px; margin-bottom: 50px; font-size: 1.1rem; text-transform: uppercase; animation: pulse 2s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 0.6; transform: translateY(0); } 50% { opacity: 1; transform: translateY(-5px); } }

        .envelope-wrapper { position: relative; width: 320px; height: 220px; cursor: pointer; transition: transform 0.3s ease; }
        .envelope-wrapper:hover { transform: scale(1.05); }
        .envelope { position: absolute; width: 100%; height: 100%; background: #4a000d; box-shadow: 0 20px 50px rgba(212, 175, 55, 0.2); border-bottom-left-radius: 12px; border-bottom-right-radius: 12px; }
        .envelope::before { content: ''; position: absolute; bottom: 0; left: 0; border-left: 160px solid #5c0011; border-right: 160px solid #5c0011; border-top: 110px solid transparent; border-bottom: 110px solid #3d000a; border-bottom-left-radius: 12px; border-bottom-right-radius: 12px; z-index: 3; }
        .flap { position: absolute; top: 0; left: 0; border-left: 160px solid transparent; border-right: 160px solid transparent; border-top: 120px solid #7a0016; transform-origin: top; transition: transform 0.7s cubic-bezier(0.4, 0, 0.2, 1); z-index: 4; }
        .wax-seal { position: absolute; top: 100px; left: 50%; transform: translateX(-50%); width: 50px; height: 50px; background: radial-gradient(circle, #d4af37 30%, #a88316 100%); border-radius: 50%; z-index: 5; display: flex; justify-content: center; align-items: center; color: #3d000a; font-family: 'Great Vibes', cursive; font-size: 1.8rem; transition: opacity 0.4s ease; box-shadow: 0 4px 10px rgba(0,0,0,0.6); }
        .letter { position: absolute; bottom: 0; left: 5%; width: 90%; height: 95%; background: linear-gradient(to bottom, #fdfbf7, #f4eee1); z-index: 2; transition: transform 1.2s cubic-bezier(0.4, 0, 0.2, 1) 0.5s; padding: 20px; text-align: center; border-radius: 8px; border: 1px solid #d4af37; }
        .letter h3 { font-family: 'Great Vibes', cursive; color: #5c0011; font-size: 2.2rem; margin-top: 30px; }
        .envelope-wrapper.open .flap { transform: rotateX(180deg); z-index: 1; }
        .envelope-wrapper.open .wax-seal { opacity: 0; }
        .envelope-wrapper.open .letter { transform: translateY(-90px); }

        /* =========================================
           KONTEN UTAMA
           ========================================= */
        #konten-utama {
            display: none; opacity: 0; width: 100%; max-width: 600px; margin: 0 auto;
            padding: 60px 20px 150px 20px; flex-direction: column; gap: 80px; z-index: 10;
            transition: opacity 1.5s ease; position: relative;
        }
        .section-card {
            background: rgba(30, 5, 10, 0.5); backdrop-filter: blur(10px); border: 1px solid rgba(212, 175, 55, 0.2); border-radius: 20px; padding: 40px 30px; text-align: center; box-shadow: 0 15px 35px rgba(0,0,0,0.5); opacity: 0; transform: translateY(60px) scale(0.95); transition: all 1s cubic-bezier(0.25, 1, 0.5, 1); position: relative; overflow: hidden;
        }
        .section-card.active { opacity: 1; transform: translateY(0) scale(1); }
        h1.title { font-family: 'Great Vibes', cursive; font-size: 4rem; color: #d4af37; margin-bottom: 5px; text-shadow: 0 2px 10px rgba(212, 175, 55, 0.4); line-height: 1.1; }
        h2.subtitle { font-family: 'Cinzel', serif; font-size: 1.1rem; color: #e0bfb8; margin-bottom: 25px; letter-spacing: 2px; text-transform: uppercase; }
        p.text { font-size: 1rem; line-height: 1.8; color: #e8e8e8; font-weight: 300; }
        .divider { width: 60px; height: 2px; background: #d4af37; margin: 20px auto; opacity: 0.5; }
        .typing-text { font-size: 1.1rem; min-height: 90px; color: #fdfbf7; font-style: italic; line-height: 1.7; margin-top: 15px;}

        /* Galeri & Interaktif */
        .photo-gallery { position: relative; width: 100%; height: 300px; margin: 20px auto; display: flex; justify-content: center; align-items: center; }
        .photo { position: absolute; width: 160px; height: 200px; background: #fff; padding: 8px 8px 35px 8px; border-radius: 4px; box-shadow: 0 15px 30px rgba(0,0,0,0.7); transition: all 0.5s cubic-bezier(0.25, 1, 0.5, 1); cursor: pointer; }
        .photo img { width: 100%; height: 100%; object-fit: cover; border-radius: 2px; }
        .photo-1 { transform: rotate(-10deg) translateX(-60px); z-index: 1; }
        .photo-2 { transform: rotate(5deg) translateX(60px); z-index: 2; }
        .photo-3 { transform: rotate(-2deg) translateY(20px); z-index: 3; }
        .photo:hover { transform: scale(1.2) translateY(-10px) rotate(0deg); z-index: 10; box-shadow: 0 25px 50px rgba(0,0,0,0.9); }

        .flip-container { display: flex; flex-direction: column; gap: 15px; margin-top: 20px; }
        .flip-card { background-color: transparent; width: 100%; height: 80px; perspective: 1000px; cursor: pointer; }
        .flip-card-inner { position: relative; width: 100%; height: 100%; text-align: center; transition: transform 0.6s; transform-style: preserve-3d; }
        .flip-card.flipped .flip-card-inner { transform: rotateX(180deg); }
        .flip-card-front, .flip-card-back { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; display: flex; align-items: center; justify-content: center; border-radius: 12px; border: 1px solid rgba(212, 175, 55, 0.4); font-family: 'Cinzel', serif; font-size: 0.95rem; }
        .flip-card-front { background: rgba(0,0,0,0.6); color: #d4af37; box-shadow: inset 0 0 15px rgba(212, 175, 55, 0.1); }
        .flip-card-back { background: rgba(212, 175, 55, 0.2); color: #fff; transform: rotateX(180deg); font-family: 'Montserrat', sans-serif; font-style: italic; padding: 10px; }

        .secret-box { border: 1px dashed #d4af37; padding: 30px; border-radius: 15px; margin-top: 20px; transition: all 0.5s ease; }
        .btn-reveal { background: linear-gradient(45deg, #d4af37, #f3e5ab, #d4af37); background-size: 200%; border: none; padding: 12px 30px; border-radius: 30px; color: #1a0b0e; font-family: 'Montserrat', sans-serif; font-weight: 600; cursor: pointer; box-shadow: 0 5px 15px rgba(212, 175, 55, 0.4); transition: all 0.3s ease; }
        .btn-reveal:hover { transform: translateY(-3px); box-shadow: 0 8px 20px rgba(212, 175, 55, 0.6); }
        #secret-message { display: none; margin-top: 20px; font-size: 1.05rem; line-height: 1.8; color: #fdfbf7; animation: fadeIn 1s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }

        @media (max-width: 480px) {
            h1.title { font-size: 3.2rem; }
            .envelope-wrapper { width: 280px; height: 190px; }
            .envelope::before { border-left: 140px solid #5c0011; border-right: 140px solid #5c0011; border-top: 95px solid transparent; border-bottom: 95px solid #3d000a; }
            .flap { border-left: 140px solid transparent; border-right: 140px solid transparent; border-top: 105px solid #7a0016; }
            .wax-seal { top: 85px; }
            .ornament-corner { width: 110px; }
        }
    </style>
</head>

    <script>
        function bukaAmplop() {
            const wrapper = document.querySelector('.envelope-wrapper');
            const layarAmplop = document.getElementById('layar-amplop');
            const kontenUtama = document.getElementById('konten-utama');

            wrapper.classList.add('open');
            const audio = document.getElementById("backsound");
            audio.volume = 0.5;
            audio.play().catch(e => console.log("Autoplay diblokir browser."));

            setTimeout(() => {
                layarAmplop.style.opacity = '0';
                setTimeout(() => {
                    layarAmplop.style.visibility = 'hidden';
                    kontenUtama.style.display = 'flex';
                    
                    setTimeout(() => {
                        kontenUtama.style.opacity = '1';
                        setTimeout(typeWriter, 800);
                        
                        // Menjalankan Kelopak Bunga (Lebih Cepat & Banyak)
                        setInterval(buatPetal, 150); 
                        
                        // Menjalankan Kunang-kunang di Background
                        buatKunangKunang();
                    }, 100);
                }, 1500);
            }, 2500);
        }

        const txt = "Untuk seorang perempuan hebat yang kehadirannya membuat duniaku menjadi jauh lebih berwarna dan bermakna...";
        let i = 0;
        function typeWriter() {
            if (i < txt.length) {
                document.getElementById("typewriter").innerHTML += txt.charAt(i);
                i++;
                setTimeout(typeWriter, 50);
            }
        }

        const reveals = document.querySelectorAll(".reveal");
        const revealOptions = { threshold: 0.15, rootMargin: "0px 0px -50px 0px" };
        const revealOnScroll = new IntersectionObserver(function(entries) {
            entries.forEach(entry => { if (entry.isIntersecting) { entry.target.classList.add("active"); } });
        }, revealOptions);
        reveals.forEach(reveal => { revealOnScroll.observe(reveal); });

        function bukaRahasia(btn) {
            btn.style.display = 'none';
            document.getElementById('secret-message').style.display = 'block';
            document.getElementById('box-rahasia').style.border = '1px solid #d4af37';
            document.getElementById('box-rahasia').style.background = 'rgba(212, 175, 55, 0.05)';
        }

        // LOGIKA KELOPAK BUNGA DIPERBANYAK (Parallax 3D)
        function buatPetal() {
            // Membuat 2 kelopak sekaligus setiap kali fungsi dipanggil (agar sangat lebat)
            for(let j=0; j<2; j++) {
                const petal = document.createElement("div");
                petal.classList.add("petal");
                
                // Efek 3D Parallax: Beberapa kelopak jatuh di belakang (blur), beberapa di depan
                if(Math.random() > 0.6) {
                    petal.classList.add("petal-bg"); 
                }

                const size = Math.random() * 10 + 6; // Ukuran bervariasi
                petal.style.width = size + "px"; 
                petal.style.height = size * 1.3 + "px"; 
                petal.style.left = Math.random() * 100 + "vw";
                petal.style.animationDuration = (Math.random() * 4 + 5) + "s"; // Jatuh lebih dinamis (5-9 detik)
                
                document.body.appendChild(petal);
                setTimeout(() => { petal.remove(); }, 9000); // Hapus memori
            }
        }

        // LOGIKA KUNANG-KUNANG (Partikel Statis Background)
        function buatKunangKunang() {
            for (let k = 0; k < 25; k++) {
                const firefly = document.createElement("div");
                firefly.classList.add("firefly");
                firefly.style.left = Math.random() * 100 + "vw";
                firefly.style.top = Math.random() * 100 + "vh";
                firefly.style.animationDuration = (Math.random() * 10 + 5) + "s";
                firefly.style.animationDelay = (Math.random() * 5) + "s";
                document.body.appendChild(firefly);
            }
        }
    </script>
</body>
</html>
