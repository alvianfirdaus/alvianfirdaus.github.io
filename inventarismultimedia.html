<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Inventaris Multimedia</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --primary: #2563eb;
            --primary-hover: #1d4ed8;
            --bg-color: #f1f5f9;
            --card-bg: #ffffff;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --border: #e2e8f0;
            --danger: #ef4444;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        
        body { background-color: var(--bg-color); color: var(--text-main); }

        /* Container & Views */
        .view-section { display: none; min-height: 100vh; padding: 20px; align-items: center; justify-content: center; }
        .view-section.active { display: flex; flex-direction: column; }
        
        .card {
            background: var(--card-bg); width: 100%; max-width: 500px;
            padding: 30px; border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }
        
        .card.dashboard-card { max-width: 1000px; padding: 20px; align-items: flex-start; justify-content: flex-start; }

        /* Typography & Forms */
        .header { text-align: center; margin-bottom: 25px; }
        .header h2 { font-size: 1.5rem; margin-bottom: 5px; }
        .header p { font-size: 0.9rem; color: var(--text-muted); }

        .form-group { margin-bottom: 18px; }
        label { display: block; font-size: 0.9rem; font-weight: 500; margin-bottom: 8px; }
        input, select {
            width: 100%; padding: 10px 15px; border: 1px solid var(--border);
            border-radius: 6px; font-size: 0.95rem; background-color: #f8fafc;
        }
        input:focus, select:focus { outline: none; border-color: var(--primary); background-color: #fff; }
        
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }

        /* Buttons */
        button {
            width: 100%; padding: 12px; background-color: var(--primary); color: white;
            border: none; border-radius: 6px; font-size: 1rem; font-weight: 600; cursor: pointer; transition: 0.2s;
        }
        button:hover { background-color: var(--primary-hover); }
        button:disabled { background-color: #94a3b8; cursor: not-allowed; }
        
        .btn-outline { background: transparent; border: 1px solid var(--border); color: var(--text-main); }
        .btn-outline:hover { background: #f1f5f9; }
        .btn-danger { background: var(--danger); }
        .btn-danger:hover { background: #dc2626; }

        /* Dashboard Specific */
        .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; width: 100%; }
        .top-bar h2 { font-size: 1.2rem; }
        .action-buttons { display: flex; gap: 10px; }
        .action-buttons button { width: auto; padding: 8px 15px; font-size: 0.9rem; margin: 0;}

        /* Table */
        .table-responsive { width: 100%; overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; text-align: left; font-size: 0.9rem; }
        th, td { padding: 12px 15px; border-bottom: 1px solid var(--border); }
        th { background-color: #f8fafc; font-weight: 600; color: var(--text-muted); white-space: nowrap; }
        tr:hover { background-color: #f8fafc; }
        .badge { padding: 4px 8px; border-radius: 4px; font-size: 0.8rem; font-weight: 500; }
        
        /* Modifikasi Warna Badge Baru/Bekas */
        .badge-Baru { background: #dcfce7; color: #166534; } /* Hijau */
        .badge-Bekas { background: #fef3c7; color: #92400e; } /* Kuning Oranye */

        .alert { display: none; padding: 12px; border-radius: 6px; margin-bottom: 20px; font-size: 0.9rem; text-align: center; }
        .alert-error { background-color: #fee2e2; color: #991b1b; border: 1px solid #fecaca; }
        .alert-success { background-color: #dcfce7; color: #166534; border: 1px solid #bbf7d0; }
        
        .loading-text { text-align: center; padding: 20px; color: var(--text-muted); }
    </style>
</head>
<body>

    <!-- ================= VIEW: LOGIN ================= -->
    <div id="loginView" class="view-section active">
        <div class="card">
            <div class="header">
                <h2>Login Inventaris</h2>
                <p>Masukkan kredensial untuk mengakses sistem</p>
            </div>
            <div id="loginAlert" class="alert alert-error"></div>
            <form id="loginForm">
                <div class="form-group">
                    <label>Username</label>
                    <input type="text" id="username" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="password" required>
                </div>
                <button type="submit">Masuk</button>
            </form>
        </div>
    </div>

    <!-- ================= VIEW: DASHBOARD (READ) ================= -->
    <div id="dashboardView" class="view-section">
        <div class="card dashboard-card">
            <div class="top-bar">
                <h2>Dashboard Inventaris</h2>
                <div class="action-buttons">
                    <button onclick="showView('formView')"><i class="fas fa-plus"></i> Tambah Data</button>
                    <button onclick="refreshData()" class="btn-outline"><i class="fas fa-sync"></i> Refresh</button>
                    <button onclick="logout()" class="btn-danger"><i class="fas fa-sign-out-alt"></i> Keluar</button>
                </div>
            </div>
            
            <div class="table-responsive">
                <table>
                    <thead>
                        <tr>
                            <th>Tanggal</th>
                            <th>Kode Barang</th>
                            <th>Nama Barang</th>
                            <th>Kategori</th>
                            <th>Jumlah</th>
                            <th>Kondisi</th>
                            <th>Keterangan</th> <!-- Mengubah Header Tabel -->
                        </tr>
                    </thead>
                    <tbody id="tableBody">
                        <tr><td colspan="7" class="loading-text">Menarik data dari Spreadsheet... <i class="fas fa-spinner fa-spin"></i></td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- ================= VIEW: FORM INPUT (CREATE) ================= -->
    <div id="formView" class="view-section">
        <div class="card">
            <div class="header">
                <h2>Input Inventaris</h2>
                <p>Catat pergerakan dan kondisi alat baru</p>
            </div>
            <div id="formAlert" class="alert"></div>
            <form id="inventoryForm">
                <div class="form-group">
                    <label>Kode Barang (Label ID)</label>
                    <input type="text" name="kode_barang" placeholder="Contoh: CAM-001" required>
                </div>
                <div class="form-group">
                    <label>Nama Barang & Merk</label>
                    <input type="text" name="nama_barang" placeholder="Contoh: Sony A7III" required>
                </div>
                <div class="form-group">
                    <label>Kategori Alat</label>
                    <select name="kategori" required>
                        <option value="" disabled selected>Pilih Kategori...</option>
                        <option value="Kamera & Lensa">Kamera & Lensa</option>
                        <option value="Audio & Mic">Audio & Mic</option>
                        <option value="Lighting">Lighting</option>
                        <option value="Lainnya">Lainnya</option>
                    </select>
                </div>
                <div class="grid-2">
                    <div class="form-group">
                        <label>Jumlah</label>
                        <input type="number" name="jumlah" min="1" value="1" required>
                    </div>
                    <div class="form-group">
                        <label>Kondisi Barang</label>
                        <!-- Mengubah Dropdown menjadi Baru / Bekas -->
                        <select name="kondisi" required>
                            <option value="Baru" selected>Baru</option>
                            <option value="Bekas">Bekas</option>
                        </select>
                    </div>
                </div>
                <div class="form-group">
                    <label>Keterangan</label>
                    <!-- Mengubah Input menjadi Keterangan -->
                    <input type="text" name="keterangan" placeholder="Keterangan tambahan..." required>
                </div>
                
                <button type="submit" id="btnSubmit">Simpan Data</button>
                <button type="button" onclick="showView('dashboardView')" class="btn-outline" style="margin-top: 10px;">Batal & Kembali</button>
            </form>
        </div>
    </div>

    <script>
        // MASUKKAN URL DEPLOYMENT BARU KAMU DI SINI
        const scriptURL = 'https://script.google.com/macros/s/AKfycbzpaaOzhtUxs2wjkK0UXp22tXEmS4hulYhOOxlSZOXJw1fCVeARjFGCYt0eKt12IxdMBg/exec';
        
        // Kredensial Login Hardcode
        const USERNAME_VALID = "admin";
        const PASSWORD_VALID = "admin123";

        // Fungsi Routing/Ganti Halaman
        function showView(viewId) {
            document.querySelectorAll('.view-section').forEach(view => view.classList.remove('active'));
            document.getElementById(viewId).classList.add('active');
            
            if(viewId === 'dashboardView') {
                refreshData();
            }
        }

        // Cek Session saat halaman dimuat
        window.onload = function() {
            if (sessionStorage.getItem('isLoggedIn') === 'true') {
                showView('dashboardView');
            }
        };

        // --- LOGIC LOGIN ---
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;
            const alert = document.getElementById('loginAlert');

            if (user === USERNAME_VALID && pass === PASSWORD_VALID) {
                sessionStorage.setItem('isLoggedIn', 'true');
                document.getElementById('loginForm').reset();
                alert.style.display = 'none';
                showView('dashboardView');
            } else {
                alert.textContent = "Username atau Password salah!";
                alert.style.display = 'block';
            }
        });

        // --- LOGIC LOGOUT ---
        function logout() {
            sessionStorage.removeItem('isLoggedIn');
            showView('loginView');
        }

        // --- LOGIC READ DASHBOARD (GET) ---
        function refreshData() {
            const tableBody = document.getElementById('tableBody');
            tableBody.innerHTML = '<tr><td colspan="7" class="loading-text">Memuat data terbaru... <i class="fas fa-spinner fa-spin"></i></td></tr>';
            
            fetch(scriptURL)
                .then(res => res.json())
                .then(data => {
                    tableBody.innerHTML = ''; // Kosongkan loading
                    if(data.length === 0) {
                        tableBody.innerHTML = '<tr><td colspan="7" style="text-align:center;">Belum ada data inventaris.</td></tr>';
                        return;
                    }

                    // Looping data dari bawah (terbaru) ke atas
                    data.reverse().forEach(row => {
                        // Menyesuaikan Badge dengan string "Baru" atau "Bekas"
                        let kondisiClass = row.kondisi === "Baru" ? "badge-Baru" : "badge-Bekas";
                        let tgl = new Date(row.tanggal).toLocaleDateString('id-ID');

                        let tr = document.createElement('tr');
                        tr.innerHTML = `
                            <td>${tgl}</td>
                            <td><strong>${row.kode}</strong></td>
                            <td>${row.nama}</td>
                            <td>${row.kategori}</td>
                            <td>${row.jumlah}</td>
                            <td><span class="badge ${kondisiClass}">${row.kondisi}</span></td>
                            <td>${row.keterangan}</td> <!-- Memanggil Keterangan -->
                        `;
                        tableBody.appendChild(tr);
                    });
                })
                .catch(err => {
                    tableBody.innerHTML = '<tr><td colspan="7" class="loading-text" style="color:red;">Gagal memuat data. Cek koneksi.</td></tr>';
                });
        }

        // --- LOGIC CREATE (POST) ---
        const form = document.getElementById('inventoryForm');
        const btnSubmit = document.getElementById('btnSubmit');
        const formAlert = document.getElementById('formAlert');

        form.addEventListener('submit', e => {
            e.preventDefault();
            btnSubmit.disabled = true;
            btnSubmit.innerHTML = 'Menyimpan... ⏳';
            formAlert.style.display = 'none';

            fetch(scriptURL, { method: 'POST', body: new FormData(form) })
                .then(response => {
                    formAlert.className = 'alert alert-success';
                    formAlert.innerHTML = '✅ Data berhasil disimpan!';
                    formAlert.style.display = 'block';
                    form.reset();
                    
                    setTimeout(() => {
                        formAlert.style.display = 'none';
                        showView('dashboardView');
                    }, 1500);
                })
                .catch(error => {
                    formAlert.className = 'alert alert-error';
                    formAlert.innerHTML = '❌ Gagal menyimpan data.';
                    formAlert.style.display = 'block';
                })
                .finally(() => {
                    btnSubmit.disabled = false;
                    btnSubmit.innerHTML = 'Simpan Data';
                });
        });
    </script>
</body>
</html>
